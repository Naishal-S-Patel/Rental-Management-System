<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Payment received</title></head>
<body style="font-family: Arial, sans-serif; color: #1a1a1a;">
    <div style="max-width: 480px; margin: 0 auto; padding: 24px;">
        <h2>Hi <span th:text="${firstName}">there</span>,</h2>
        <p>We've received your payment of <strong th:text="${totalAmount}">0.00</strong> for order
            <strong th:text="${orderId}">order-id</strong>, including a security deposit of
            <strong th:text="${depositAmount}">0.00</strong> which will be held until the product is returned.</p>
        <p>Your invoice is available for download from your account.</p>
    </div>
</body>
</html>
