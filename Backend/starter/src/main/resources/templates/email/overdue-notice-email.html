<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Rental overdue</title></head>
<body style="font-family: Arial, sans-serif; color: #1a1a1a;">
    <div style="max-width: 480px; margin: 0 auto; padding: 24px;">
        <h2>Hi <span th:text="${firstName}">there</span>,</h2>
        <p>Your rental for order <strong th:text="${orderId}">order-id</strong> is now
            <strong th:text="${daysOverdue}">0</strong> day(s) overdue.</p>
        <p>A late fee is accruing daily. Please return the product as soon as possible to avoid
            further charges - see PRD_README.md §7 for how the fee is calculated.</p>
    </div>
</body>
</html>
