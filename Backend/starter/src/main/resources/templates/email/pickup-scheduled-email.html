<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Pickup scheduled</title></head>
<body style="font-family: Arial, sans-serif; color: #1a1a1a;">
    <div style="max-width: 480px; margin: 0 auto; padding: 24px;">
        <h2>Hi <span th:text="${firstName}">there</span>,</h2>
        <p>Your pickup has been scheduled for order <strong th:text="${orderId}">order-id</strong>.</p>
        <p>Please visit the store on the scheduled date to collect your rental.</p>
    </div>
</body>
</html>
