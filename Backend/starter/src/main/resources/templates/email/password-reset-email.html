<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Reset your password</title></head>
<body style="font-family: Arial, sans-serif; color: #1a1a1a;">
    <div style="max-width: 480px; margin: 0 auto; padding: 24px;">
        <h2>Hi <span th:text="${firstName}">there</span>,</h2>
        <p>We received a request to reset your password. Click below to choose a new one.</p>
        <p style="margin: 32px 0;">
            <a th:href="${resetLink}" style="background-color: #2563eb; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 6px;">
                Reset Password
            </a>
        </p>
        <p>If the button doesn't work, copy and paste this link into your browser:</p>
        <p th:text="${resetLink}" style="word-break: break-all; color: #555;"></p>
        <p>This link expires in <span th:text="${expiryMinutes}">30</span> minutes. If you didn't request this, you can safely ignore this email.</p>
    </div>
</body>
</html>
