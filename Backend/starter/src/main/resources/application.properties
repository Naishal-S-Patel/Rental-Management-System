spring.application.name=starter

# Allow circular references (SecurityConfig <-> OAuth2Handler <-> UserService)
spring.main.allow-circular-references=true

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/rental_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=dogo75@789np#713

# Caffeine cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=5000,expireAfterWrite=10m

# JPA - no Flyway, entity annotations are the source of truth for schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.hackathon.starter=DEBUG
# %X{requestId} pulls the per-request correlation id set by RequestLoggingFilter - ties every
# log line for one request together, and is also echoed back as the X-Request-Id response header.
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{35} - %msg%n

