spring.application.name=storage-service
server.port=8081

# Relative to this module's own working directory (Backend/storage-service) so it resolves to
# Backend/storage regardless of machine - never hardcode an absolute path here.
storage.root-dir=${STORAGE_ROOT_DIR:../storage}

# Plain JDBC against SQLite - no JPA/Hibernate, see FileMetadataRepository.
spring.datasource.url=jdbc:sqlite:${storage.root-dir}/metadata.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

logging.level.com.hackathon.storage_service=DEBUG
